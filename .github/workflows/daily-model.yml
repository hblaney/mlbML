name: Daily MLB Model

on:
  workflow_dispatch:
  schedule:
    # 3:00 AM America/Chicago during the MLB season daylight-saving window.
    - cron: "0 8 * * *"

concurrency:
  group: daily-mlb-model
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-model-outputs:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      ODDS_REGIONS: us
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate model outputs
        run: |
          npm run model:daily

      - name: Commit updated public data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily MLB model outputs"
          file_pattern: "public/*.json"
